<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="card">

    <div class="tabs">
      <button class="tab active" data-tab="login">Sign In</button>
      <button class="tab" data-tab="register">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="panel active" id="login">
      <h2>Sign In</h2>
      <label>Email</label>
      <input id="l-email" type="email" placeholder="you@example.com"/>
      <label>Password</label>
      <div class="password-field">
        <input id="l-pass" type="password" placeholder="Password"/>
        <button type="button" class="eye-btn" onclick="togglePassword('l-pass')">👁️</button>
      </div>
      <button class="btn" onclick="login()">Sign In</button>
    </div>  

    <!-- REGISTER -->
    <div class="panel" id="register">
      <h2>Create Account</h2>
      <label>Name</label>
      <input id="r-name" type="text" placeholder="Your name"/>
      <label>Email</label>
      <input id="r-email" type="email" placeholder="you@example.com"/>
      <label>Password</label>
      <div class="password-field">
        <input id="r-pass" type="password" placeholder="Min. 8 characters"/>
        <button type="button" class="eye-btn" onclick="togglePassword('r-pass')">👁️</button>
      </div>
      <button class="btn" onclick="register()">Create Account</button>
    </div>

    <p class="msg" id="msg"></p>

  </div>

  <script src="script.js"></script>
</body>
</html>
